<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday MaMa❤️</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        background: linear-gradient(to right, #ffdde1, #ee9ca7);
        overflow-x: hidden;
    }

    section {
        padding: 60px 20px;
    }

    h1, h2 {
        color: #fff;
    }

    /* Landing */
    .landing {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        background: #ff6f91;
        color: white;
        cursor: pointer;
        margin-top: 20px;
    }

    /* Gallery */
    .gallery img {
        width: 200px;
        margin: 10px;
        border-radius: 15px;
        transition: transform 0.3s;
    }

    .gallery img:hover {
        transform: scale(1.1);
    }

    /* Letter */
    .letter {
        background: rgba(255,255,255,0.2);
        border-radius: 20px;
        padding: 30px;
        max-width: 600px;
        margin: auto;
        color: white;
    }

    /* Floating hearts animation */
    .heart {
        position: fixed;
        bottom: -10px;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-800px); opacity: 0; }
    }
</style>
</head>

<body>

<!-- 🎉 Landing Section -->
<section class="landing">
    <h1>🎉 Happy Birthday, Mama! 🎉</h1>
    <p>Click below for a little surprise ❤️</p>
    <button onclick="scrollToSection()">Enter 🎁</button>
</section>

<!-- 📸 Gallery -->
<section id="gallery">
    <h2>📸 Memories</h2>
    <div class="gallery">
        <img src="e:\pic 1.jpeg">
        <img src="e:\pic 2.jpeg">
        <img src="e:\pic 3.jpeg">
    </div>
</section>

<!-- 💌 Letter -->
<section>
    <h2>💌 A Message for you</h2>
    <div class="letter">
        <p>
            Dear Mama, <br><br>
            You make life brighter just by being with us, 
            we are so lucky to have you 💖  
            Wishing you endless happiness today and always.
        </p>
    </div>
</section>

<section>
    <h2>🎵 Your Song</h2>
    <iframe width="300" height="170"
        src="https://www.youtube.com/embed/ShDNEiNmP40"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>
</section>


<script>
    function scrollToSection() {
        document.getElementById("gallery").scrollIntoView({behavior: "smooth"});
    }

    // Create floating hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
